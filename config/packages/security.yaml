security:
    role_hierarchy:
        ROLE_ADMIN:
            - ROLE_MANAGER

        ROLE_MANAGER:
            - ROLE_EMPLOYEE

        ROLE_EMPLOYEE:
            - ROLE_CUSTOMER

    # Password hashing configuration (auto selects best available algorithm)
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # User provider - loads users from database using email
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        # Disable security for dev tools and assets
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Admin firewall
        admin:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_admin_login
                check_path: app_admin_login
                enable_csrf: true
                default_target_path: app_admin_dashboard_index

            logout:
                path: app_admin_logout
                target: app_admin_login

        # Shop firewall (shared for public + customer area)
        shop:
            pattern: ^/shop
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_shop_login
                check_path: app_shop_login
                enable_csrf: true
                default_target_path: app_shop_dashboard

            logout:
                path: app_shop_logout
                target: app_shop_login

        # Default firewall (fallback)
        main:
            lazy: true
            provider: app_user_provider

    access_control:
        # Public access to login/logout pages
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin/logout, roles: PUBLIC_ACCESS }
        - { path: ^/shop/login, roles: PUBLIC_ACCESS }
        - { path: ^/shop/logout, roles: PUBLIC_ACCESS }
        - { path: ^/shop/register, roles: PUBLIC_ACCESS }

        # Admin area restricted to admins only
        - { path: ^/admin, roles: ROLE_ADMIN }

        # Protected customer-only sections inside shop
        # IMPORTANT: must be above general /shop rule
        - { path: ^/shop/account, roles: ROLE_CUSTOMER }
        - { path: ^/shop/profile, roles: ROLE_CUSTOMER }
        - { path: ^/shop/orders, roles: ROLE_CUSTOMER }
        - { path: ^/shop/customer, roles: ROLE_CUSTOMER }

        # Entire shop is publicly accessible
        # This rule must be last for /shop
        - { path: ^/shop, roles: PUBLIC_ACCESS }
